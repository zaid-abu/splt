<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Splt Glassmorphism · Android</title>
  <style>
:root {
  --bg: #eef6ff;
  --surface: rgba(255, 255, 255, 0.74);
  --surface-warm: rgba(238, 246, 255, 0.72);
  --fg: #102033;
  --fg-2: #34465f;
  --muted: #60708a;
  --meta: #4f8cff;
  --border: rgba(255, 255, 255, 0.64);
  --border-soft: rgba(255, 255, 255, 0.38);
  --accent: #4f8cff;
  --accent-on: #ffffff;
  --accent-hover: color-mix(in oklab, var(--accent), black 8%);
  --accent-active: color-mix(in oklab, var(--accent), black 14%);
  --success: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --font-display: Inter, system-ui, sans-serif;
  --font-body: Inter, system-ui, sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 18px;
  --text-xl: 24px;
  --text-2xl: 36px;
  --text-3xl: 54px;
  --text-4xl: 76px;
  --leading-body: 1.55;
  --leading-tight: 1.04;
  --tracking-display: -0.025em;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --section-y-desktop: 104px;
  --section-y-tablet: 72px;
  --section-y-phone: 52px;
  --radius-sm: 16px;
  --radius-md: 24px;
  --radius-lg: 36px;
  --radius-pill: 9999px;
  --elev-flat: none;
  --elev-ring: 0 0 0 1px var(--border);
  --elev-raised: 0 24px 80px rgba(79, 140, 255, 0.18);
  --focus-ring: 0 0 0 4px rgba(79, 140, 255, 0.28);
  --motion-fast: 180ms;
  --motion-base: 280ms;
  --ease-standard: cubic-bezier(0.22, 1, 0.36, 1);
  --container-max: 1180px;
  --container-gutter-desktop: 36px;
  --container-gutter-tablet: 24px;
  --container-gutter-phone: 16px;
}
  </style>
  <link rel="stylesheet" href="splt-mobile.css">
</head>
<body class="android" data-platform="android">
  <div class="ambient" aria-hidden="true"></div>
  <main class="prototype" data-od-id="android-prototype">
    <section class="device" aria-label="Splt Android prototype">
      <div class="statusbar"><span>9:41</span><span class="status-icons">◒ ▴ ▰</span></div>
      <div class="island" aria-hidden="true"></div>
      <div class="app" id="app"></div>
      <div class="home-indicator" aria-hidden="true"></div>
    </section>
  </main>
  <script src="splt-mobile.js"></script>
</body>
</html>
