name: CD

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI
  push:
    tags:
      - 'v*' # Trigger on tags that start with 'v' (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo $ENCODED_KEYSTORE | base64 --decode > android/app/release.keystore
          else
            echo "ANDROID_KEYSTORE_BASE64 secret is not set. Building unsigned APK."
          fi

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      - name: Build APK
        working-directory: android
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f "app/release.keystore" ]; then
            echo "Keystore found. Building signed release APK."
            ./gradlew assembleRelease \
              --build-cache \
              --parallel \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
              -Pandroid.injected.signing.store.password=$MYAPP_UPLOAD_STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$MYAPP_UPLOAD_KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$MYAPP_UPLOAD_KEY_PASSWORD
          else
            echo "No keystore found. Building unsigned release APK."
            ./gradlew assembleRelease --build-cache --parallel
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ github.ref_name }}
          # Generate a tag name if it's not a tag push
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
